name: Build & Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package macOS App
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Package as a .app first
          fyne package -os darwin -name "SonosStatus" -icon Icon.png
          
          # Build the .pkg installer
          pkgbuild --component "SonosStatus.app" --install-location "/Applications" "SonosStatus.pkg"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: SonosStatus-macOS
          path: SonosStatus.pkg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libasound2-dev pkg-config

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package Linux
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          fyne package -os linux -name "SonosStatus" -icon Icon.png
          # Debug to see what was actually created
          ls -R
          # On Linux, fyne package creates a .tar.xz archive
          if [ -f "SonosStatus.tar.xz" ]; then
            tar -xvf SonosStatus.tar.xz
            # Find the binary in the extracted usr directory
            # It could be in usr/bin or usr/local/bin
            BINARY_PATH=$(find usr -type f -name "SonosStatus" -o -name "sonos-status" | head -n 1)
            if [ -n "$BINARY_PATH" ]; then
              mv "$BINARY_PATH" SonosStatus
            fi
          fi
          # Fallback check for raw binary if it wasn't a tarball
          if [ -f "sonos-status" ] && [ ! -f "SonosStatus" ]; then mv sonos-status SonosStatus; fi
          
          # Final check - if we still don't have SonosStatus, see if anything else was created
          if [ ! -f "SonosStatus" ] && [ -f "sonos-status" ]; then mv sonos-status SonosStatus; fi

          tar -czvf SonosStatus-Linux.tar.gz SonosStatus

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: SonosStatus-Linux
          path: SonosStatus-Linux.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install Windows Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package Windows
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Cross-compile for Windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc fyne package -os windows -name "SonosStatus" -icon Icon.png
          # If output is lowercase from module name, rename it
          if [ -f "sonos-status.exe" ] && [ ! -f "SonosStatus.exe" ]; then mv sonos-status.exe SonosStatus.exe; fi
          zip SonosStatus-Windows.zip SonosStatus.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v6
        with:
          name: SonosStatus-Windows
          path: SonosStatus-Windows.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir release_files
          cp artifacts/SonosStatus-macOS/SonosStatus.pkg release_files/SonosStatus-macOS.pkg
          cp artifacts/SonosStatus-Linux/SonosStatus-Linux.tar.gz release_files/SonosStatus-Linux.tar.gz
          cp artifacts/SonosStatus-Windows/SonosStatus-Windows.zip release_files/SonosStatus-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          draft: false
          prerelease: false
          files: |
            release_files/SonosStatus-macOS.pkg
            release_files/SonosStatus-Linux.tar.gz
            release_files/SonosStatus-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
